name: Deploy root site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-root"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate portfolios.json
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("portfolios.json")
          if not path.exists():
              raise SystemExit("portfolios.json not found")

          data = json.loads(path.read_text(encoding="utf-8"))

          if not isinstance(data, list):
              raise SystemExit("portfolios.json must contain a list")

          required = ["name", "slug", "description", "cover"]

          for i, item in enumerate(data, start=1):
              if not isinstance(item, dict):
                  raise SystemExit(f"Entry {i} is not an object")
              for key in required:
                  if key not in item or not str(item[key]).strip():
                      raise SystemExit(f"Entry {i} is missing required field: {key}")

          print("portfolios.json is valid")
          PY

      - name: Ensure index.html exists
        run: test -f index.html

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
