name: Sync portfolios and deploy root site

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-root"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TEMPLATE_REPO: textile-template

jobs:
  sync-portfolios:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Sync portfolios.json from textile template repos
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          ROOT_REPO: ${{ github.event.repository.name }}
          TEMPLATE_REPO: ${{ env.TEMPLATE_REPO }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          token = os.environ["GITHUB_TOKEN"]
          owner = os.environ["GITHUB_OWNER"]
          root_repo = os.environ["ROOT_REPO"]
          template_repo = os.environ["TEMPLATE_REPO"]
          output_file = Path(os.environ["GITHUB_OUTPUT"])
          portfolios_path = Path("portfolios.json")

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "portfolio-sync",
          }

          def fetch_json(url: str):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          repos = []
          page = 1
          while True:
              url = f"https://api.github.com/users/{owner}/repos?type=owner&per_page=100&page={page}"
              page_items = fetch_json(url)
              if not page_items:
                  break
              repos.extend(page_items)
              page += 1

          existing = json.loads(portfolios_path.read_text(encoding="utf-8")) if portfolios_path.exists() else []
          existing_by_slug = {
              item.get("slug"): item
              for item in existing
              if isinstance(item, dict) and item.get("slug")
          }

          synced_by_slug = {
              slug: dict(item)
              for slug, item in existing_by_slug.items()
          }

          for repo in repos:
              slug = repo.get("name", "").strip()
              if not slug or slug == root_repo or repo.get("fork"):
                  continue

              template = repo.get("template_repository") or {}
              if template.get("name") != template_repo:
                  continue

              previous = existing_by_slug.get(slug, {})
              display_name = previous.get("name") or slug.replace("-", " ").title()
              description = previous.get("description") or repo.get("description") or f"Preview collection for {display_name}."
              watermark = previous.get("watermark") or "© Your Name"

              synced_by_slug[slug] = {
                  "name": display_name,
                  "slug": slug,
                  "description": description,
                  "cover": f"/{slug}/cover.jpg",
                  "watermark": watermark,
              }

          synced = sorted(
              synced_by_slug.values(),
              key=lambda item: str(item.get("name", "")).lower(),
          )
          rendered = json.dumps(synced, indent=2, ensure_ascii=False) + "\n"
          current = portfolios_path.read_text(encoding="utf-8") if portfolios_path.exists() else ""
          changed = current != rendered

          if changed:
              portfolios_path.write_text(rendered, encoding="utf-8")

          with output_file.open("a", encoding="utf-8") as fh:
              fh.write(f"changed={'true' if changed else 'false'}\n")
              fh.write(f"count={len(synced)}\n")

          print(f"Synced {len(synced)} portfolio entries from template repo '{template_repo}'.")
          if changed:
              print("portfolios.json updated.")
          else:
              print("portfolios.json already up to date.")
          PY

      - name: Commit updated portfolios.json
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "pjprojectdev@outlook.com"
          git add portfolios.json
          git commit -m "chore: sync portfolios.json"
          git push

  bootstrap-portfolio-repos:
    needs: sync-portfolios
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Fail if bootstrap token is missing
        run: |
          if [ -z "${BOOTSTRAP_TOKEN}" ]; then
            echo "Missing required secret: PAGES_ADMIN_TOKEN"
            echo "Create a fine-grained personal access token with Administration: write, Contents: read and write, Secrets: write, Actions: write, and Pages: write."
            exit 1
          fi
        env:
          BOOTSTRAP_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}

      - name: Install PyNaCl for secret encryption
        run: python -m pip install --disable-pip-version-check pynacl

      - name: Create missing portfolio repos and provision secrets
        env:
          BOOTSTRAP_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          TEMPLATE_REPO: ${{ env.TEMPLATE_REPO }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from base64 import b64decode, b64encode
          from pathlib import Path
          from nacl import encoding, public

          owner = os.environ["GITHUB_OWNER"]
          template_repo = os.environ["TEMPLATE_REPO"]
          token = os.environ["BOOTSTRAP_TOKEN"]
          portfolios = json.loads(Path("portfolios.json").read_text(encoding="utf-8"))
          secret_name = "PAGES_ADMIN_TOKEN"

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "portfolio-bootstrap",
          }

          def api_request(url: str, method: str = "GET", data: dict | None = None):
              payload = None
              if data is not None:
                  payload = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=payload, method=method, headers=headers)
              try:
                  with urllib.request.urlopen(req) as response:
                      return response.status, json.load(response)
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  return exc.code, body

          def encrypt_secret(public_key_b64: str, value: str) -> str:
              public_key = public.PublicKey(public_key_b64.encode("utf-8"), encoding.Base64Encoder())
              sealed_box = public.SealedBox(public_key)
              encrypted = sealed_box.encrypt(value.encode("utf-8"))
              return b64encode(encrypted).decode("utf-8")

          created = []
          existing = []
          provisioned = []

          for item in portfolios:
              if not isinstance(item, dict):
                  continue

              cover = str(item.get("cover", "")).strip()
              slug = str(item.get("slug", "")).strip()
              match = re.match(r"^/([^/]+)/cover\.jpg$", cover)
              cover_slug = match.group(1) if match else ""

              if cover_slug and slug and cover_slug != slug:
                  raise SystemExit(f"Portfolio slug and cover path do not match for {item!r}")

              target_repo = cover_slug or slug
              if not target_repo or target_repo == template_repo:
                  continue

              repo_url = f"https://api.github.com/repos/{owner}/{target_repo}"
              repo_status, repo_payload = api_request(repo_url)
              if repo_status == 404:
                  create_status, create_payload = api_request(
                      f"https://api.github.com/repos/{owner}/{template_repo}/generate",
                      method="POST",
                      data={
                          "owner": owner,
                          "name": target_repo,
                          "description": str(item.get("description", "")).strip() or f"Preview collection for {target_repo}.",
                          "include_all_branches": False,
                          "private": False,
                      },
                  )
                  if create_status != 201:
                      raise SystemExit(f"Failed to create repo {target_repo}: {create_status} {create_payload}")
                  created.append(target_repo)
              elif repo_status == 200:
                  existing.append(target_repo)
              else:
                  raise SystemExit(f"Unable to inspect repo {target_repo}: {repo_status} {repo_payload}")

              key_status, key_payload = api_request(
                  f"https://api.github.com/repos/{owner}/{target_repo}/actions/secrets/public-key"
              )
              if key_status != 200:
                  raise SystemExit(f"Failed to fetch secret public key for {target_repo}: {key_status} {key_payload}")

              encrypted_value = encrypt_secret(key_payload["key"], token)
              secret_status, secret_payload = api_request(
                  f"https://api.github.com/repos/{owner}/{target_repo}/actions/secrets/{secret_name}",
                  method="PUT",
                  data={
                      "encrypted_value": encrypted_value,
                      "key_id": key_payload["key_id"],
                  },
              )
              if secret_status not in {201, 204}:
                  raise SystemExit(f"Failed to set {secret_name} for {target_repo}: {secret_status} {secret_payload}")
              provisioned.append(target_repo)

          print(f"Created {len(created)} repo(s): {', '.join(created) if created else 'none'}")
          print(f"Existing {len(existing)} repo(s): {', '.join(existing) if existing else 'none'}")
          print(f"Provisioned {secret_name} in {len(provisioned)} repo(s).")
          PY

  bootstrap-portfolio-workflows:
    needs: bootstrap-portfolio-repos
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Fail if bootstrap token is missing
        run: |
          if [ -z "${BOOTSTRAP_TOKEN}" ]; then
            echo "Missing required secret: PAGES_ADMIN_TOKEN"
            echo "Create a fine-grained personal access token with Administration: write, Contents: read and write, Secrets: write, Actions: write, and Pages: write."
            exit 1
          fi
        env:
          BOOTSTRAP_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}

      - name: Copy deploy.yml if missing and trigger portfolio publish
        env:
          BOOTSTRAP_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          TEMPLATE_REPO: ${{ env.TEMPLATE_REPO }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from pathlib import Path

          owner = os.environ["GITHUB_OWNER"]
          template_repo = os.environ["TEMPLATE_REPO"]
          token = os.environ["BOOTSTRAP_TOKEN"]
          portfolios = json.loads(Path("portfolios.json").read_text(encoding="utf-8"))
          workflow_path = ".github/workflows/deploy.yml"

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "portfolio-bootstrap",
          }

          def api_request(url: str, method: str = "GET", data: dict | None = None):
              payload = None
              if data is not None:
                  payload = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=payload, method=method, headers=headers)
              try:
                  with urllib.request.urlopen(req) as response:
                      if response.status == 204:
                          return response.status, None
                      return response.status, json.load(response)
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  return exc.code, body

          template_url = f"https://api.github.com/repos/{owner}/{template_repo}/contents/{workflow_path}"
          status, template_payload = api_request(template_url)
          if status != 200:
              raise SystemExit(f"Failed to read template workflow from {template_repo}: {status} {template_payload}")

          template_content = base64.b64decode(template_payload["content"]).decode("utf-8")
          encoded_content = base64.b64encode(template_content.encode("utf-8")).decode("ascii")

          created = []
          dispatched = []
          skipped = []

          for item in portfolios:
              if not isinstance(item, dict):
                  continue

              cover = str(item.get("cover", "")).strip()
              slug = str(item.get("slug", "")).strip()
              match = re.match(r"^/([^/]+)/cover\.jpg$", cover)
              cover_slug = match.group(1) if match else ""

              if cover_slug and slug and cover_slug != slug:
                  raise SystemExit(f"Portfolio slug and cover path do not match for {item!r}")

              target_repo = cover_slug or slug
              if not target_repo or target_repo == template_repo:
                  continue

              target_url = f"https://api.github.com/repos/{owner}/{target_repo}/contents/{workflow_path}"
              workflow_status, workflow_payload = api_request(target_url)
              if workflow_status == 404:
                  create_status, create_payload = api_request(
                      target_url,
                      method="PUT",
                      data={
                          "message": "Add deploy workflow from textile-template",
                          "content": encoded_content,
                          "branch": "main",
                      },
                  )
                  if create_status not in {200, 201}:
                      raise SystemExit(f"Failed to create workflow for {target_repo}: {create_status} {create_payload}")
                  created.append(target_repo)
              elif workflow_status != 200:
                  raise SystemExit(f"Unable to inspect workflow for {target_repo}: {workflow_status} {workflow_payload}")

              dispatch_status, dispatch_payload = api_request(
                  f"https://api.github.com/repos/{owner}/{target_repo}/actions/workflows/deploy.yml/dispatches",
                  method="POST",
                  data={"ref": "main"},
              )
              if dispatch_status != 200:
                  skipped.append(f"{target_repo} (dispatch failed: {dispatch_status})")
                  continue
              dispatched.append(target_repo)

          print(f"Created deploy workflow in {len(created)} repo(s): {', '.join(created) if created else 'none'}")
          print(f"Dispatched publish workflow in {len(dispatched)} repo(s): {', '.join(dispatched) if dispatched else 'none'}")
          if skipped:
              print(f"Skipped {len(skipped)} repo(s): {', '.join(skipped)}")
          PY

  validate:
    needs: bootstrap-portfolio-workflows
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Validate portfolios.json
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("portfolios.json")
          if not path.exists():
              raise SystemExit("portfolios.json not found")

          data = json.loads(path.read_text(encoding="utf-8"))

          if not isinstance(data, list):
              raise SystemExit("portfolios.json must contain a list")

          required = ["name", "slug", "description", "cover"]

          for i, item in enumerate(data, start=1):
              if not isinstance(item, dict):
                  raise SystemExit(f"Entry {i} is not an object")
              for key in required:
                  if key not in item or not str(item[key]).strip():
                      raise SystemExit(f"Entry {i} is missing required field: {key}")

          print("portfolios.json is valid")
          PY

      - name: Ensure required files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
